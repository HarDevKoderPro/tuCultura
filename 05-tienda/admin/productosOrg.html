<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos - Admin Tienda</title>
    
    <link rel="shortcut icon" href="../../01-principal/imagenes/LogoTCPCircle.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/tienda.css">
    <link rel="stylesheet" href="../../01-principal/css/normalize.css">
    <style>
        body { background: #f0f2f5; }
        .admin-sidebar {
            background: var(--color-primario);
            padding: 1rem;
            position: fixed;
            top: 0; left: 0;
            height: 100vh; width: 250px;
            overflow-y: auto; z-index: 1000;
        }
        .admin-sidebar-logo {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 1rem; color: #fff; text-decoration: none; margin-bottom: 1rem;
        }
        .admin-sidebar-logo img { height: 40px; }
        .admin-sidebar-logo span { font-weight: bold; font-size: 1.1rem; }
        .admin-sidebar-menu { list-style: none; }
        .admin-sidebar-menu li a {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem 1rem; color: rgba(255,255,255,0.8);
            text-decoration: none; border-radius: var(--radio-borde);
            transition: var(--transicion);
        }
        .admin-sidebar-menu li a:hover, .admin-sidebar-menu li a.activo {
            background: rgba(255,255,255,0.1); color: #fff;
        }
        .admin-main { margin-left: 250px; padding: 1.5rem; min-height: 100vh; }
        .admin-header-bar {
            background: #fff; padding: 1rem 1.5rem; margin: -1.5rem -1.5rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--sombra); flex-wrap: wrap; gap: 1rem;
        }
        @media (max-width: 768px) {
            .admin-sidebar { display: none; }
            .admin-main { margin-left: 0; }
        }
    </style>
</head>
<body>
    <aside class="admin-sidebar">
        <a href="index.html" class="admin-sidebar-logo">
            <img src="../../01-principal/imagenes/LogoTCPCircle.png" alt="Logo">
            <span>Admin Tienda</span>
        </a>
        <ul class="admin-sidebar-menu">
            <li><a href="index.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
            <li><a href="productos.html" class="activo"><i class="fas fa-box"></i> Productos</a></li>
            <li><a href="categorias.html"><i class="fas fa-tags"></i> Categorías</a></li>
            <li><a href="pedidos.html"><i class="fas fa-shopping-bag"></i> Pedidos</a></li>
            <li><a href="../index.html"><i class="fas fa-store"></i> Ver Tienda</a></li>
        </ul>
    </aside>
    
    <main class="admin-main">
        <div class="admin-header-bar">
            <h1 style="font-size: 1.5rem; color: var(--color-primario);"><i class="fas fa-box"></i> Gestión de Productos</h1>
            <button class="btn-primario" onclick="abrirModalProducto()">
                <i class="fas fa-plus"></i> Nuevo Producto
            </button>
        </div>
        
        <div class="admin-tabla-container">
            <table class="admin-tabla" id="tabla-productos">
                <thead>
                    <tr>
                        <th>Imagen</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Destacado</th>
                        <th>Activo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="8"><div class="loading"><div class="spinner"></div></div></td></tr>
                </tbody>
            </table>
        </div>
    </main>
    
    <!-- Modal Producto -->
    <div class="modal" id="modal-producto">
        <div class="modal-contenido">
            <div class="modal-header">
                <h2 id="modal-titulo">Nuevo Producto</h2>
                <button class="modal-cerrar" onclick="cerrarModal()">&times;</button>
            </div>
            <form id="form-producto" onsubmit="guardarProducto(event)">
                <input type="hidden" id="producto-id" name="id">
                
                <div class="form-grupo">
                    <label for="producto-nombre">Nombre *</label>
                    <input type="text" id="producto-nombre" name="nombre" required>
                </div>
                
                <div class="form-grupo">
                    <label for="producto-descripcion">Descripción</label>
                    <textarea id="producto-descripcion" name="descripcion" rows="3"></textarea>
                </div>
                
                <div class="form-fila">
                    <div class="form-grupo">
                        <label for="producto-precio">Precio *</label>
                        <input type="number" id="producto-precio" name="precio" step="0.01" required>
                    </div>
                    <div class="form-grupo">
                        <label for="producto-precio-oferta">Precio Oferta</label>
                        <input type="number" id="producto-precio-oferta" name="precio_oferta" step="0.01">
                    </div>
                </div>
                
                <div class="form-fila">
                    <div class="form-grupo">
                        <label for="producto-categoria">Categoría</label>
                        <select id="producto-categoria" name="categoria_id"></select>
                    </div>
                    <div class="form-grupo">
                        <label for="producto-stock">Stock *</label>
                        <input type="number" id="producto-stock" name="stock" value="0" required>
                    </div>
                </div>
                
                <div class="form-fila">
                    <div class="form-grupo">
                        <label for="producto-sku">SKU</label>
                        <input type="text" id="producto-sku" name="sku">
                    </div>
                    <div class="form-grupo">
                        <label for="producto-marca">Marca</label>
                        <input type="text" id="producto-marca" name="marca">
                    </div>
                </div>
                
                <div class="form-grupo">
                    <label for="producto-imagen">Nombre de imagen</label>
                    <input type="text" id="producto-imagen" name="imagen" placeholder="ejemplo.jpg">
                </div>
                
                <div class="form-fila">
                    <div class="form-grupo">
                        <label>Destacado</label>
                        <label class="toggle-switch">
                            <input type="checkbox" id="producto-destacado" name="destacado">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="form-grupo">
                        <label>Activo</label>
                        <label class="toggle-switch">
                            <input type="checkbox" id="producto-activo" name="activo" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="submit" class="btn-primario"><i class="fas fa-save"></i> Guardar</button>
                    <button type="button" class="btn-secundario" onclick="cerrarModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="../../sweetalert2.min.js"></script>
    <script src="admin-productos.js"></script>
</body>
</html>

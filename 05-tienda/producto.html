<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#023859">
    <title>Producto - Tu Cultura es Progreso</title>
    
    <link rel="shortcut icon" href="../01-principal/imagenes/LogoTCPCircle.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/tienda.css">
    <link rel="stylesheet" href="../01-principal/css/normalize.css">
</head>
<body>
    <!-- Header -->
    <header class="tienda-header">
        <div class="tienda-header-content">
            <a href="index.html" class="tienda-logo">
                <img src="../01-principal/imagenes/LogoTCPCircle.png" alt="Tu Cultura es Progreso">
                <span>TCP Tienda</span>
            </a>
            
            <div class="tienda-busqueda">
                <input type="text" id="busqueda-input" placeholder="Buscar productos...">
                <button id="btn-buscar"><i class="fas fa-search"></i></button>
            </div>
            
            <div class="tienda-header-iconos">
                <a href="../index.html" class="tienda-header-icono" title="Inicio">
                    <i class="fas fa-home"></i>
                </a>
                <a href="carrito.html" class="tienda-header-icono" id="icono-carrito" title="Carrito">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="carrito-badge" id="carrito-cantidad">0</span>
                </a>
                <a href="../02-iniciarSesion/iniciarSesion.html?origen=tienda" class="tienda-header-icono" id="icono-usuario">
                    <i class="fas fa-user"></i>
                </a>
            </div>
        </div>
    </header>
    
    <!-- Breadcrumb -->
    <nav class="nav-categorias">
        <a href="index.html">Tienda</a>
        <span style="color: #999; padding: 0 0.5rem;">></span>
        <span id="breadcrumb-categoria">Categoría</span>
        <span style="color: #999; padding: 0 0.5rem;">></span>
        <span id="breadcrumb-producto">Producto</span>
    </nav>
    
    <!-- Contenido -->
    <main class="tienda-container">
        <div class="producto-detalle" id="producto-detalle">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
        
        <!-- Productos Relacionados -->
        <section style="margin-top: 2rem;">
            <h2 style="color: var(--color-primario); margin-bottom: 1rem;"><i class="fas fa-th-large"></i> Productos Relacionados</h2>
            <div class="productos-grid" id="productos-relacionados"></div>
        </section>
    </main>
    
    <!-- Footer -->
    <footer class="tienda-footer">
        <div class="footer-contenido">
            <div class="footer-seccion">
                <h3>Tu Cultura es Progreso</h3>
                <a href="../index.html">Ir al sitio principal</a>
            </div>
            <div class="footer-seccion">
                <h3>Ayuda</h3>
                <a href="carrito.html">Mi Carrito</a>
                <a href="mis-pedidos.html">Mis Pedidos</a>
            </div>
        </div>
        <div class="footer-copy">
            <p>&copy; 2024 Tu Cultura es Progreso.</p>
        </div>
    </footer>
    
    <script src="../sweetalert2.min.js"></script>
    <script src="js/sesion-ui.js"></script>
    <script src="js/producto.js"></script>
</body>
</html>
